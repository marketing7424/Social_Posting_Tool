app = 'social-posting-tool'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = 'spt_data'
  destination = '/data'

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
